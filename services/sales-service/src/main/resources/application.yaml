spring:
  application:
    name: sales-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/sales}
    username: ${DB_USER:sales_user}
    password: ${DB_PASSWORD:sales_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${SERVER_PORT:8083}

pharmaops:
  services:
    inventory:
      url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
  kafka:
    topics:
      sales-completed: pharmaops.sales.completed
      returns-processed: pharmaops.returns.processed

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.pharmaops.sales: DEBUG
    root: INFO